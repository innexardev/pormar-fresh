name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - run: npm run build --workspace=@freshbox/api
      - run: npm run build --workspace=@freshbox/web
      - run: npm run build --workspace=@freshbox/admin
