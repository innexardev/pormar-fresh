name: pomar-fresh

services:
  postgres:
    image: postgres:16-alpine
    container_name: pomar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-freshbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-freshbox}
    volumes:
      - pomar_pg:/var/lib/postgresql/data
    networks:
      - pomar-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-freshbox}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pomar-redis
    restart: unless-stopped
    networks:
      - pomar-internal
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pomar-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - pomar_minio:/data
    networks:
      - pomar-internal
      - fixelo-network
    labels:
      - traefik.enable=false

  minio-init:
    image: minio/mc:latest
    container_name: pomar-minio-init
    restart: 'no'
    depends_on:
      minio:
        condition: service_started
    networks:
      - pomar-internal
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD >/dev/null 2>&1; do sleep 2; done;
      mc mb local/pomar-fresh --ignore-existing;
      mc anonymous set public local/pomar-fresh;
      echo 'MinIO bucket pomar-fresh ready (public read)';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pomar-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-freshbox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-freshbox}?schema=public
      S3_ENDPOINT: http://pomar-minio:9000
      S3_PUBLIC_URL: https://${DOMAIN}/media/pomar-fresh
      CORS_ORIGINS: https://${DOMAIN},https://www.${DOMAIN},https://admin.${DOMAIN}
      NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
      DOMAIN: ${DOMAIN}
      ADMIN_PANEL_URL: https://admin.${DOMAIN}
      WHATSAPP_API_URL: http://evolution:8080
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      DRIVER_PIN: ${DRIVER_PIN:-847291}
      DEPOT_STREET: ${DEPOT_STREET:-Av. Presidente Kennedy}
      DEPOT_NUMBER: ${DEPOT_NUMBER:-1000}
      DEPOT_NEIGHBORHOOD: ${DEPOT_NEIGHBORHOOD:-Vila Mirim}
      DEPOT_CITY: ${DEPOT_CITY:-Praia Grande}
      DEPOT_STATE: ${DEPOT_STATE:-SP}
      DEPOT_ZIP_CODE: ${DEPOT_ZIP_CODE:-11705000}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - pomar-internal
      - fixelo-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=fixelo_fixelo-network
      - traefik.http.routers.pomar-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.pomar-api.entrypoints=websecure
      - traefik.http.routers.pomar-api.tls.certresolver=cloudflare
      - traefik.http.routers.pomar-api.priority=200
      - traefik.http.routers.pomar-api-admin.rule=Host(`admin.${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.pomar-api-admin.entrypoints=websecure
      - traefik.http.routers.pomar-api-admin.tls.certresolver=cloudflare
      - traefik.http.routers.pomar-api-admin.priority=250
      - traefik.http.routers.pomar-api-admin.service=pomar-api
      - traefik.http.services.pomar-api.loadbalancer.server.port=3010

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api/v1
        NEXT_PUBLIC_STORE_NAME: ${NEXT_PUBLIC_STORE_NAME:-Pomar Fresh}
        NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
    container_name: pomar-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - fixelo-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=fixelo_fixelo-network
      - traefik.http.routers.pomar-web.rule=Host(`${DOMAIN}`) && PathPrefix(`/`) && !PathPrefix(`/api`) && !PathPrefix(`/media`)
      - traefik.http.routers.pomar-web.entrypoints=websecure
      - traefik.http.routers.pomar-web.tls.certresolver=cloudflare
      - traefik.http.routers.pomar-web.priority=1
      - traefik.http.services.pomar-web.loadbalancer.server.port=3020

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: https://admin.${DOMAIN}/api/v1
    container_name: pomar-admin
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - fixelo-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=fixelo_fixelo-network
      - traefik.http.routers.pomar-admin.rule=Host(`admin.${DOMAIN}`) && !PathPrefix(`/api`) && !PathPrefix(`/media`)
      - traefik.http.routers.pomar-admin.entrypoints=websecure
      - traefik.http.routers.pomar-admin.tls.certresolver=cloudflare
      - traefik.http.routers.pomar-admin.priority=100
      - traefik.http.services.pomar-admin.loadbalancer.server.port=3021

  minio-public:
    image: nginx:alpine
    container_name: pomar-minio-proxy
    restart: unless-stopped
    depends_on:
      - minio
    networks:
      - pomar-internal
      - fixelo-network
    volumes:
      - ./deploy/minio-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=fixelo_fixelo-network
      - traefik.http.routers.pomar-media.rule=Host(`${DOMAIN}`) && PathPrefix(`/media`)
      - traefik.http.routers.pomar-media.entrypoints=websecure
      - traefik.http.routers.pomar-media.tls.certresolver=cloudflare
      - traefik.http.routers.pomar-media.priority=150
      - traefik.http.middlewares.pomar-media-strip.stripprefix.prefixes=/media
      - traefik.http.routers.pomar-media.middlewares=pomar-media-strip
      - traefik.http.routers.pomar-media-admin.rule=Host(`admin.${DOMAIN}`) && PathPrefix(`/media`)
      - traefik.http.routers.pomar-media-admin.entrypoints=websecure
      - traefik.http.routers.pomar-media-admin.tls.certresolver=cloudflare
      - traefik.http.routers.pomar-media-admin.priority=240
      - traefik.http.routers.pomar-media-admin.middlewares=pomar-media-strip
      - traefik.http.routers.pomar-media-admin.service=pomar-media
      - traefik.http.services.pomar-media.loadbalancer.server.port=80

  postgres-evolution-init:
    image: postgres:16-alpine
    container_name: pomar-postgres-evolution-init
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-freshbox}
    networks:
      - pomar-internal
    entrypoint: >
      /bin/sh -c "
      psql -h postgres -U $$POSTGRES_USER -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'evolution'\" | grep -q 1 ||
      psql -h postgres -U $$POSTGRES_USER -d postgres -c 'CREATE DATABASE evolution;';
      echo 'Database evolution ready';
      "

  evolution:
    image: evoapicloud/evolution-api:v2.3.6
    container_name: pomar-evolution
    restart: unless-stopped
    environment:
      SERVER_URL: https://evolution.${DOMAIN}
      AUTHENTICATION_API_KEY: ${WHATSAPP_API_KEY:-changeme-evolution-key}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: 'true'
      DEL_INSTANCE: 'true'
      DATABASE_ENABLED: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-freshbox}:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_pomar
      CACHE_LOCAL_ENABLED: 'true'
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: pomar_evolution_cache
      CACHE_REDIS_TTL: '604800'
      REDIS_ENABLED: 'true'
      REDIS_URI: redis://redis:6379/0
      REDIS_PREFIX_KEY: pomar_evolution
      WEBHOOK_GLOBAL_URL: https://${DOMAIN}/api/v1/webhooks/whatsapp
      WEBHOOK_GLOBAL_ENABLED: 'true'
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: 'false'
      WEBHOOK_EVENTS_MESSAGES_UPSERT: 'true'
      WEBHOOK_EVENTS_CONNECTION_UPDATE: 'true'
      WEBHOOK_EVENTS_QRCODE_UPDATED: 'true'
      CONFIG_SESSION_PHONE_CLIENT: Pomar Fresh
      CONFIG_SESSION_PHONE_NAME: Chrome
      SYNC_FULL_HISTORY: 'false'
    volumes:
      - pomar_evolution:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      postgres-evolution-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - pomar-internal
      - fixelo-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=fixelo_fixelo-network
      - traefik.http.routers.pomar-evolution.rule=Host(`evolution.${DOMAIN}`)
      - traefik.http.routers.pomar-evolution.entrypoints=websecure
      - traefik.http.routers.pomar-evolution.tls.certresolver=cloudflare
      - traefik.http.services.pomar-evolution.loadbalancer.server.port=8080

networks:
  pomar-internal:
    driver: bridge
  fixelo-network:
    external: true
    name: fixelo_fixelo-network

volumes:
  pomar_pg:
  pomar_minio:
  pomar_evolution:
